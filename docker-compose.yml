version: '3.9'

services:

  postgres:
    image: postgres:16

    container_name: careflow-postgres

    restart: always

    environment:
      POSTGRES_DB: careflowdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
     - "5440:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: